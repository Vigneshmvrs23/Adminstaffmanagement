{% extends "admin/base.html" %}
{% block content %}
<h2>✏️ Edit Staff</h2>

<div class="edit-staff-card">
    <form method="post" class="edit-staff-form">
        <div class="form-group">
            <label for="name">Name</label>
            <input id="name" type="text" name="name" value="{{ staff.name }}" required>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" name="email" value="{{ staff.email }}" required>
        </div>

        <div class="form-group">
            <label for="status">Status</label>
            <select id="status" name="is_active">
                <option value="1" {% if staff.is_active %}selected{% endif %}>Active</option>
                <option value="0" {% if not staff.is_active %}selected{% endif %}>Inactive</option>
            </select>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-save">Save Changes</button>
        </div>
    </form>
</div>
{% endblock %}
