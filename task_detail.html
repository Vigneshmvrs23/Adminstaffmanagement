{% extends "staff/base.html" %}
{% block content %}
<h2>📝 Task Details</h2>

<div class="task-details">
    <h3 class="task-title">{{ task.title }}</h3>

    <div class="detail-row description">
        <span class="label">📝 Description :</span>
        <p class="value">{{ task.description }}</p>
    </div>

    <div class="detail-row">
        <span class="label">📅 Due Date :</span>
        <span class="value">{{ task.deadline }}</span>
    </div>

    <div class="detail-row">
        <span class="label">⚡ Status :</span>
        <span class="status-badge {{ task.status }}">
            {{ task.status|capitalize }}
        </span>
    </div>

    {% if task.status == 'pending' %}
    <div class="detail-row actions">
        <span class="label">🚀 Action :</span>   <!-- ✅ impressive emoji -->
        <span class="value">
            <a href="{{ url_for('staff.complete_task', id=task.id) }}" class="btn-complete">✅ Mark Complete</a>
        </span>
    </div>
    {% endif %}
</div>

<a href="{{ url_for('staff.dashboard') }}" class="back-btn">←</a>
{% endblock %}
