<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login - Hotel App</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <form method="post">
        <h2>Login</h2>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul>
              {% for category, msg in messages %}
                <li class="{{ category }}">{{ msg }}</li>
              {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <!-- Login form inputs -->
        <input type="email" name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>

        <!-- Forgot password link -->
        <p style="text-align:right; margin:5px 0;">
            <a href="{{ url_for('auth.forgot_password') }}">Forgot password?</a>
        </p>

        <button type="submit">Login</button>

        <!-- <p>Don't have account? <a href="{{ url_for('auth.register') }}">Create account</a></p> -->
    </form>

    <script>
    function toggleAuthMenu(){
        document.getElementById('auth-mobile-menu').classList.toggle('show');
    }
    document.addEventListener('DOMContentLoaded', function(){
        document.querySelectorAll('#auth-mobile-menu a').forEach(function(el){
            el.addEventListener('click', toggleAuthMenu);
        });
    });
    </script>
</body>
</html>
